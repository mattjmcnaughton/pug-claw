name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new-release-published }}
      new-release-version: ${{ steps.semantic.outputs.new-release-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - run: bun install
      - name: Install semantic-release
        run: npm install semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec
      - name: Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset_name: pug-claw-linux-x86_64
          - os: macos-latest
            target: bun-darwin-arm64
            asset_name: pug-claw-macos-aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new-release-version }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build binary
        run: bun build --compile --target=${{ matrix.target }} src/main.ts --outfile ${{ matrix.asset_name }}
      - name: Compress binary
        run: tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}
      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2.4.1
        with:
          tag_name: v${{ needs.release.outputs.new-release-version }}
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.tar.gz
